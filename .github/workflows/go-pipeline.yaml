name: product-catalog pipeline
on:
  pull_request:
    branches:
    - main
    paths:
    - src/product-catalog

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - name: checkout
      uses: actions/checkout@v6

    - name: setup go
      uses: actions/setup-go@v6
      with:
        go-version: '1.23'

    - name: golangci-lint
      uses: golangci/golangci-lint-action@v9
      with:
        version: v2.11
        working-directory: src/product-catalog


  test: 
    runs-on: ubuntu-latest
    steps:
    - name: checkout
      uses: actions/checkout@v6

    - name: setup go
      uses: actions/setup-go@v6
      with:
        go-version: '1.23'

    - name: run test
      run: go test ./...
      working-directory: src/product-catalog/


  build-test: 
    runs-on: ubuntu-latest
    needs: test
    steps:
    - name: checkout 
      uses: actions/checkout@v6

    - name: setup go
      uses: actions/setup-go@v6
      with:
        go-version: '1.23'

    - name: build
      run: |
        go mod download
        go build -o product-catalog-service main.go
      working-directory: src/product-catalog/ 


  docker: 
    runs-on: ubuntu-latest
    needs: build-test
    steps:
    - name: checkout 
      uses: actions/checkout@v6
      
    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ vars.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
      
    - name: Build and push
      uses: docker/build-push-action@v7
      with:
        context: src/product-catalog/
        file: src/product-catalog/Dockerfile
        push: true
        tags: ${{ vars.DOCKERHUB_USERNAME }}/product-catalog:${{ github.run_id }}

    
  update-deployment:
    runs-on: ubuntu-latest
    needs: docker
    steps:
    - name: checkout
      uses: actions/checkout@v6
      with:
        token: ${{ secrets.GH-TOKEN }}

    - name: sed
      run: sed -i "s|image: .*|image: ${{ vars.DOCKERHUB_USERNAME }}/product-catalog:${{ github.run_id }}|g" kubernetes/productcatalog/deploy.yaml

    - name: GIT
      run: |
        git config user.name "Abdelhady"
        git config user.email "abdelhady.elsayedd@gmail.com"
        git add ./kubernetes/productcatalog/deploy.yaml 
        git commit -m "Update image to ${{ github.run_id }} [skip ci]"
        git push


